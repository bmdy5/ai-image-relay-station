<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Soft, warm off-white background matching the UI -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#FDFBF9" />
    </linearGradient>

    <!-- Warm Copper/Orange gradient matching the primary button -->
    <linearGradient id="primaryOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E88D72" />
      <stop offset="100%" stop-color="#C56A50" />
    </linearGradient>

    <!-- Softer beige/copper for accents -->
    <linearGradient id="accentBeige" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E5D1C8" />
      <stop offset="100%" stop-color="#D4B6A9" />
    </linearGradient>

    <!-- Subtle drop shadow for the icon itself to stand out on device -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#C56A50" flood-opacity="0.15" />
    </filter>
    
    <filter id="iconShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.05" />
    </filter>
  </defs>

  <!-- App Icon Squircle Background -->
  <rect x="32" y="32" width="448" height="448" rx="100" fill="url(#bgGradient)" filter="url(#softShadow)" />
  
  <!-- Subtle inner border for premium feel -->
  <rect x="32" y="32" width="448" height="448" rx="100" fill="none" stroke="#F2EAE5" stroke-width="4" />

  <!-- Center Circle Background (matching the empty state in the UI) -->
  <circle cx="256" cy="256" r="140" fill="#FBF5F2" filter="url(#iconShadow)" />

  <g transform="translate(256, 256)">
    <!-- Four-pointed sparkles (matching the UI's AI sparkles) -->
    <path d="M -90,-80 Q -80,-80 -80,-90 Q -80,-80 -70,-80 Q -80,-80 -80,-70 Q -80,-80 -90,-80 Z" fill="url(#accentBeige)" />
    <path d="M 90,-40 Q 100,-40 100,-50 Q 100,-40 110,-40 Q 100,-40 100,-30 Q 100,-40 90,-40 Z" fill="url(#primaryOrange)" />
    <path d="M -10,100 Q 0,100 0,90 Q 0,100 10,100 Q 0,100 0,110 Q 0,100 -10,100 Z" fill="url(#accentBeige)" />
    <path d="M 60,60 Q 65,60 65,55 Q 65,60 70,60 Q 65,60 65,65 Q 65,60 60,60 Z" fill="url(#primaryOrange)" opacity="0.6" />

    <!-- The Palette -->
    <!-- Soft, rounded aesthetic -->
    <path d="M -40,-20 
             C -80,-40 -100,10 -80,50 
             C -60,90 -20,100 20,80 
             C 70,60 100,20 80,-30 
             C 60,-80 0,0 -40,-20 Z" 
          fill="none" stroke="url(#accentBeige)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" />
          
    <!-- Paint holes in the palette -->
    <circle cx="-60" cy="30" r="10" fill="url(#accentBeige)" />
    <circle cx="-20" cy="60" r="10" fill="url(#accentBeige)" />
    <circle cx="30" cy="40" r="10" fill="url(#accentBeige)" />

    <!-- The Paintbrush -->
    <!-- Handle -->
    <path d="M -60,40 L 40,-60" stroke="url(#primaryOrange)" stroke-width="16" stroke-linecap="round" />
    
    <!-- Brush metal part -->
    <path d="M 25,-45 L 45,-25" stroke="#E5D1C8" stroke-width="18" stroke-linecap="round" />
    
    <!-- Brush Tip -->
    <path d="M 35,-35 C 50,-50 70,-70 70,-70 C 70,-70 50,-50 35,-35" stroke="url(#primaryOrange)" stroke-width="24" stroke-linecap="round" />
    <path d="M 66,-66 C 80,-80 80,-80 80,-80 C 80,-80 80,-80 66,-66" stroke="url(#primaryOrange)" stroke-width="8" stroke-linecap="round" />
    
    <!-- Inner detail line on brush -->
    <path d="M -50,30 L 30,-50" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.5" />
  </g>
</svg>
