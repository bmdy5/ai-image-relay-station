<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>方案 3：悬浮岛屿 (Floating Island) - 终极版</title>
    <style>
        :root { --primary: #e66b33; --bg: #f8f9fa; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: var(--bg); font-family: sans-serif; perspective: 1000px; }
        .orbs { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; filter: blur(80px); }
        .orb { position: absolute; border-radius: 50%; opacity: 0.25; animation: move linear infinite; transition: transform 0.3s ease-out; }
        .orb-1 { width: 450px; height: 450px; background: #e66b3333; top: -100px; left: -100px; animation-duration: 30s; }
        .orb-2 { width: 600px; height: 600px; background: #3b82f611; bottom: -100px; right: -100px; animation-duration: 40s; animation-direction: reverse; }
        .orb-3 { width: 400px; height: 400px; background: #8b5cf611; top: 30%; left: 60%; animation-duration: 25s; }
        @keyframes move { 0% { transform: translate(0, 0) rotate(0deg); } 50% { transform: translate(100px, 50px) rotate(180deg); } 100% { transform: translate(0, 0) rotate(360deg); } }
        .content { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .mock-ui { 
            width: 800px; height: 500px; background: rgba(255, 255, 255, 0.4); 
            backdrop-filter: blur(50px); border: 1px solid rgba(255, 255, 255, 0.8); border-radius: 40px; 
            box-shadow: 0 50px 120px rgba(0,0,0,0.08); display: flex; flex-direction: column; align-items: center; justify-content: center; 
            color: #1d1d1f; font-weight: 800; font-size: 32px; transition: transform 0.1s; transform-style: preserve-3d;
        }
    </style>
</head>
<body>
    <div class="orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    <div class="content">
        <div id="target" class="mock-ui">
            悬浮岛屿 (3D 视差效果)
            <div style="font-size: 14px; font-weight: normal; color: #666; margin-top: 15px;">移动鼠标感受卡片的物理倾斜与背景跟随</div>
        </div>
    </div>
    <script>
        const target = document.getElementById('target');
        const orbs = document.querySelectorAll('.orb');
        window.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.clientX) / 25;
            const yAxis = (window.innerHeight / 2 - e.clientY) / 25;
            target.style.transform = `rotateY(${xAxis}deg) rotateX(${-yAxis}deg)`;
            
            // 背景视差
            orbs.forEach((orb, i) => {
                const shiftX = (e.clientX - window.innerWidth / 2) * 0.03 * (i + 1);
                const shiftY = (e.clientY - window.innerHeight / 2) * 0.03 * (i + 1);
                orb.style.left = `${(i === 0 ? -100 : (i === 1 ? -100 : 70)) + shiftX}px`;
                orb.style.top = `${(i === 0 ? -100 : (i === 1 ? 70 : 30)) + shiftY}%`;
            });
        });
    </script>
</body>
</html>
