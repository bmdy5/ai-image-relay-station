server
{
    listen 80;
    listen 443 ssl;
    listen 443 quic;
    listen [::]:443 ssl;
    listen [::]:443 quic;
    http2 on;
    server_name gpt-image2.xiaoliang.tech api.xiaoliang.tech 119.29.232.114;
    
    index index.html;
    root /www/wwwroot/gpt-image-api/frontend/dist/;
    
    # 强制 HTTPS 精细化控制 (避免 IP 无证书报错 & 保留 API POST 数据)
    set $redirect_to_https "";
    if ($server_port !~ 443) {
        set $redirect_to_https "Y";
    }
    if ($host ~* "119.29.232.114") {
        set $redirect_to_https "";
    }
    if ($redirect_to_https = "Y") {
        rewrite ^/api/(.*)$ https://$host/api/$1 redirect;
        rewrite ^(/.*)$ https://$host$1 permanent;
    }

    # 注释掉下面这行，防止宝塔残留配置干扰
    # include /www/server/panel/vhost/nginx/extension/gpt-image2.xiaoliang.tech/*.conf;

    # 静态文件访问
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 后端接口代理
    location /api {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header REMOTE-HOST $remote_addr;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    #ERROR-PAGE-START
    #error_page 404/404.html;
    ssl_certificate    /www/server/panel/vhost/cert/gpt-image2.xiaoliang.tech/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/gpt-image2.xiaoliang.tech/privkey.pem;
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_tickets on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";
    add_header Alt-Svc 'quic=":443"; h3=":443"; h3-29=":443"; h3-27=":443";h3-25=":443"; h3-T050=":443"; h3-Q050=":443";h3-Q049=":443";h3-Q048=":443"; h3-Q046=":443"; h3-Q043=":443"';
    error_page 497  https://$host$request_uri;

    #error_page 404 /404.html;
    #error_page 502/502.html;
    #error_page 502 /502.html;
    #ERROR-PAGE-END

    access_log  /www/wwwlogs/gpt-image-api.log;
    error_log  /www/wwwlogs/gpt-image-api.error.log;
}
