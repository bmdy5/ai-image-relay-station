<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>方案 1：星团云雾 (Nebula Dots) - 终极版</title>
    <style>
        :root { --primary: #e66b33; --bg: #f0f0f4; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: var(--bg); font-family: sans-serif; }
        #canvas { position: fixed; top: 0; left: 0; z-index: 0; pointer-events: none; }
        /* 增加动态云雾背景 */
        .nebula {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at var(--mx) var(--my), rgba(230, 107, 51, 0.05) 0%, transparent 50%);
            z-index: -1;
        }
        .content { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; pointer-events: none; }
        .mock-ui { 
            width: 800px; height: 500px; background: rgba(255, 255, 255, 0.6); 
            backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.7); border-radius: 32px; 
            box-shadow: 0 40px 100px rgba(0,0,0,0.08); display: flex; flex-direction: column; align-items: center; justify-content: center; 
            color: #1a1a1a; font-weight: bold; font-size: 24px; pointer-events: auto;
            position: relative; overflow: hidden;
        }
        /* 极光边框 */
        .mock-ui::after {
            content: ''; position: absolute; inset: 0; border-radius: 32px; padding: 2px;
            background: linear-gradient(45deg, transparent, rgba(230, 107, 51, 0.3), transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude;
            animation: rotate 6s linear infinite;
        }
        @keyframes rotate { 0% { background-position: 0% 0%; } 100% { background-position: 200% 200%; } }
    </style>
</head>
<body>
    <div class="nebula" id="nebula"></div>
    <canvas id="canvas"></canvas>
    <div class="content">
        <div id="target" class="mock-ui">
            Visionary 终极版预览
            <div style="font-size: 14px; font-weight: normal; color: #888; margin-top: 10px;">背景增加了动态云雾与避让逻辑</div>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const nebula = document.getElementById('nebula');
        const target = document.getElementById('target');
        let particles = [];
        let mouse = { x: -1000, y: -1000, active: false };

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX; mouse.y = e.clientY;
            document.documentElement.style.setProperty('--mx', e.clientX + 'px');
            document.documentElement.style.setProperty('--my', e.clientY + 'px');
            const rect = target.getBoundingClientRect();
            mouse.active = !(e.clientX > rect.left && e.clientX < rect.right && e.clientY > rect.top && e.clientY < rect.bottom);
        });

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() { this.init(); }
            init() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.vx = Math.random() * 0.4 - 0.2;
                this.vy = Math.random() * 0.4 - 0.2;
                this.opacity = Math.random() * 0.3 + 0.1;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                const rect = target.getBoundingClientRect();
                const dx = this.x - (rect.left + rect.width/2);
                const dy = this.y - (rect.top + rect.height/2);
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < 480) { this.x += dx / dist * 0.6; this.y += dy / dist * 0.6; }
                if (mouse.active) {
                    const mdx = this.x - mouse.x; const mdy = this.y - mouse.y;
                    const mdist = Math.sqrt(mdx*mdx + mdy*mdy);
                    if (mdist < 150) { this.x += mdx/mdist * 1.5; this.y += mdy/mdist * 1.5; }
                }
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.init();
            }
            draw() {
                ctx.fillStyle = `rgba(0, 0, 0, ${this.opacity})`;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
            }
        }

        for (let i = 0; i < 150; i++) particles.push(new Particle());
        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
