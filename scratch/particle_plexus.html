<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>方案 2：神经脉冲 (Neural Pulse) - 终极版</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #fff; font-family: sans-serif; }
        canvas { position: fixed; top: 0; left: 0; z-index: 0; }
        .content { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; pointer-events: none; }
        .mock-ui { 
            width: 800px; height: 500px; background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(40px); border-radius: 32px; border: 1px solid rgba(230, 107, 51, 0.3);
            display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 900; color: #e66b33;
            pointer-events: auto; box-shadow: 0 40px 100px rgba(230,107,51,0.1);
            text-shadow: 0 0 20px rgba(230,107,51,0.2);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="content"><div id="target" class="mock-ui">神经脉冲引擎 (带有动态脉冲连线)</div></div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const target = document.getElementById('target');
        let particles = [];
        let mouse = { x: -1000, y: -1000, active: false };

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX; mouse.y = e.clientY;
            const rect = target.getBoundingClientRect();
            mouse.active = !(e.clientX > rect.left && e.clientX < rect.right && e.clientY > rect.top && e.clientY < rect.bottom);
        });
        resize();

        class Particle {
            constructor() { this.init(); }
            init() {
                this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
                this.vx = Math.random() * 0.6 - 0.3; this.vy = Math.random() * 0.6 - 0.3;
                this.size = Math.random() * 2 + 1;
                this.pulseOffset = Math.random() * 100;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                const rect = target.getBoundingClientRect();
                this.inWindow = (this.x > rect.left && this.x < rect.right && this.y > rect.top && this.y < rect.bottom);
                if (mouse.active) {
                    const dx = this.x - mouse.x; const dy = this.y - mouse.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 180) { this.vx -= dx / dist * 0.02; this.vy -= dy / dist * 0.02; } // 吸引力
                }
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }
            draw() {
                ctx.fillStyle = `rgba(230, 107, 51, ${this.inWindow ? 0.05 : 0.4})`;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
            }
        }

        for (let i = 0; i < 90; i++) particles.push(new Particle());

        function animate(time) {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            particles.forEach((p, i) => {
                p.update(); p.draw();
                for (let j = i + 1; j < particles.length; j++) {
                    const p2 = particles[j];
                    const dx = p.x - p2.x; const dy = p.y - p2.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 130) {
                        const baseAlpha = p.inWindow || p2.inWindow ? 0.03 : 1;
                        const pulse = (Math.sin(time/500 + i) + 1) / 2; // 脉冲效果
                        ctx.strokeStyle = `rgba(230, 107, 51, ${(1 - dist/130) * 0.4 * baseAlpha * (0.5 + pulse * 0.5)})`;
                        ctx.lineWidth = 0.5 + pulse;
                        ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
                    }
                }
            });
            requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);
    </script>
</body>
</html>
